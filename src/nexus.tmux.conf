# -------------------------------------------------
#  Nexus -- bundled tmux config
#  Provides a hint bar so beginners know what
#  keys are available inside a tmux session.
# -------------------------------------------------

# Keep default prefix (Ctrl+b).
# Users can override by sourcing their own tmux.conf afterwards.

# Enable 256-colour and true-colour support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Reduce escape-key delay (nicer for vim/neovim users)
set -sg escape-time 10

# Start window and pane numbering at 1 (easier to reach on keyboard)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# -- Status bar layout ----------------------------
# Two rows: windows on top, hint bar on bottom
set -g status 2
set -g status-position bottom
set -g status-interval 5

# -- Colours --------------------------------------
NEXUS_BG="#0e0b1a"
NEXUS_ACCENT="#7d57e6"
NEXUS_FG="#dcdcff"
NEXUS_GRAY="#646464"

# -- Row 1: session name + window tabs ------------
set -g status-style "bg=#{NEXUS_BG},fg=#{NEXUS_FG}"

set -g status-left-length 30
set -g status-left "#[bg=#7d57e6,fg=black,bold] #S #[bg=#0e0b1a,fg=#7d57e6] "

set -g status-right-length 30
set -g status-right "#[fg=#646464] %H:%M  %d %b "

set -g window-status-format         "#[fg=#646464] #I:#W "
set -g window-status-current-format "#[bg=#7d57e6,fg=black,bold] #I:#W #[bg=#0e0b1a] "

# -- Row 2: keybinding hint bar -------------------
# Each hint: key pill (accent bg) + description (gray fg)
set -g status-format[1] "#[bg=#0e0b1a]#[bg=#7d57e6,fg=black,bold] ^b #[bg=#0e0b1a,fg=#646464] prefix #[fg=#646464]|#[bg=#7d57e6,fg=black,bold] d #[bg=#0e0b1a,fg=#646464] detach #[fg=#646464]|#[bg=#7d57e6,fg=black,bold] c #[bg=#0e0b1a,fg=#646464] new window #[fg=#646464]|#[bg=#7d57e6,fg=black,bold] , #[bg=#0e0b1a,fg=#646464] rename #[fg=#646464]|#[bg=#7d57e6,fg=black,bold] n/p #[bg=#0e0b1a,fg=#646464] next/prev #[fg=#646464]|#[bg=#7d57e6,fg=black,bold] % #[bg=#0e0b1a,fg=#646464] split-h #[fg=#646464]|#[bg=#7d57e6,fg=black,bold] \" #[bg=#0e0b1a,fg=#646464] split-v #[fg=#646464]|#[bg=#7d57e6,fg=black,bold] x #[bg=#0e0b1a,fg=#646464] close pane #[fg=#646464]|#[bg=#7d57e6,fg=black,bold] z #[bg=#0e0b1a,fg=#646464] zoom pane #[fg=#646464]|#[bg=#7d57e6,fg=black,bold] ? #[bg=#0e0b1a,fg=#646464] all keys "

# -- Pane borders ---------------------------------
set -g pane-border-style "fg=#2a2040"
set -g pane-active-border-style "fg=#7d57e6"

# -- Mouse support --------------------------------
set -g mouse on

# -- Vi-style copy mode ---------------------------
set-window-option -g mode-keys vi
