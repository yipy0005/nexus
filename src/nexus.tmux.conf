# -------------------------------------------------
#  Nexus -- bundled tmux config
#  Compatible with tmux >= 1.8 (no two-row status).
#  Provides a styled status bar with key hints.
# -------------------------------------------------

# Keep default prefix (Ctrl+b).

# 256-colour support
set -g default-terminal "screen-256color"

# Reduce escape-key delay
set -sg escape-time 10

# Window/pane numbering from 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# -- Status bar -----------------------------------
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#0e0b1a,fg=#dcdcff"

# Left: session name badge
set -g status-left-length 32
set -g status-left "#[bg=#7d57e6,fg=black,bold] #S #[bg=#0e0b1a,fg=#7d57e6,nobold] "

# Right: key hints + clock
set -g status-right-length 180
set -g status-right "#[bg=#7d57e6,fg=black,bold] ^b #[bg=#0e0b1a,fg=#646464] prefix #[fg=#444444]|#[bg=#7d57e6,fg=black,bold] d #[bg=#0e0b1a,fg=#646464] detach #[fg=#444444]|#[bg=#7d57e6,fg=black,bold] c #[bg=#0e0b1a,fg=#646464] new win #[fg=#444444]|#[bg=#7d57e6,fg=black,bold] n/p #[bg=#0e0b1a,fg=#646464] next/prev #[fg=#444444]|#[bg=#7d57e6,fg=black,bold] % #[bg=#0e0b1a,fg=#646464] split-h #[fg=#444444]|#[bg=#7d57e6,fg=black,bold] \" #[bg=#0e0b1a,fg=#646464] split-v #[fg=#444444]|#[bg=#7d57e6,fg=black,bold] x #[bg=#0e0b1a,fg=#646464] close #[fg=#444444]|#[bg=#7d57e6,fg=black,bold] z #[bg=#0e0b1a,fg=#646464] zoom #[fg=#444444]|#[bg=#7d57e6,fg=black,bold] ? #[bg=#0e0b1a,fg=#646464] help #[fg=#646464] %H:%M "

# Window tabs
set -g window-status-format         "#[fg=#646464] #I:#W "
set -g window-status-current-format "#[bg=#7d57e6,fg=black,bold] #I:#W #[bg=#0e0b1a,nobold] "
set -g window-status-separator      ""

# -- Pane borders ---------------------------------
set -g pane-border-style        "fg=#2a2040"
set -g pane-active-border-style "fg=#7d57e6"

# -- Mouse support --------------------------------
set -g mouse on

# -- Vi copy mode ---------------------------------
set-window-option -g mode-keys vi
