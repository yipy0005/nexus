# -------------------------------------------------
#  Nexus -- bundled tmux config
#  Compatible with tmux 2.7+ (no hex colours).
#  Uses colour0-255 palette only.
# -------------------------------------------------

# 256-colour support
set -g default-terminal "screen-256color"

# Reduce escape-key delay
set -sg escape-time 10

# Window numbering from 1
set -g base-index 1
set -g pane-base-index 1

# -- Status bar -----------------------------------
# colour17  = dark navy (close to #0e0b1a)
# colour99  = medium purple (close to #7d57e6)
# colour189 = light lavender (close to #dcdcff)
# colour241 = mid gray (close to #646464)

set -g status on
set -g status-position bottom
set -g status-interval 5

set -g status-bg colour17
set -g status-fg colour189

# Left: session name badge
set -g status-left-length 30
set -g status-left "#[bg=colour99,fg=black,bold] #S #[bg=colour17,fg=colour99] "

# Right: key hints + clock
set -g status-right-length 200
set -g status-right "#[bg=colour99,fg=black,bold] ^b #[bg=colour17,fg=colour241] prefix #[fg=colour238]|#[bg=colour99,fg=black,bold] d #[bg=colour17,fg=colour241] detach #[fg=colour238]|#[bg=colour99,fg=black,bold] c #[bg=colour17,fg=colour241] new-win #[fg=colour238]|#[bg=colour99,fg=black,bold] n/p #[bg=colour17,fg=colour241] next/prev #[fg=colour238]|#[bg=colour99,fg=black,bold] % #[bg=colour17,fg=colour241] split-h #[fg=colour238]|#[bg=colour99,fg=black,bold] \" #[bg=colour17,fg=colour241] split-v #[fg=colour238]|#[bg=colour99,fg=black,bold] x #[bg=colour17,fg=colour241] close #[fg=colour238]|#[bg=colour99,fg=black,bold] ? #[bg=colour17,fg=colour241] help #[fg=colour241] %H:%M "

# Window tabs
set -g window-status-format         "#[fg=colour241] #I:#W "
set -g window-status-current-format "#[bg=colour99,fg=black,bold] #I:#W #[bg=colour17] "

# -- Pane borders ---------------------------------
set -g pane-border-fg          colour235
set -g pane-active-border-fg   colour99

# -- Mouse support --------------------------------
set -g mouse on

# -- Vi copy mode ---------------------------------
set-window-option -g mode-keys vi
